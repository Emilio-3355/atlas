<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS // MISSION CONTROL</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F30C;</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-void:      #050508;
  --bg-panel:     #0a0a12;
  --bg-card:      #0f0f1a;
  --neon-green:   #00ff41;
  --neon-cyan:    #00d4ff;
  --neon-magenta: #ff00ff;
  --neon-amber:   #ffaa00;
  --neon-red:     #ff3333;
  --text-primary: #e0e0e0;
  --text-dim:     #606078;
  --border-glow:  rgba(0, 255, 65, 0.2);
  --font-mono:    'Share Tech Mono', 'Courier New', monospace;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  position: relative;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 255, 65, 0.015) 2px,
    rgba(0, 255, 65, 0.015) 4px
  );
}

/* Layout */
#app {
  display: grid;
  grid-template-rows: 48px 1fr 32px;
  grid-template-columns: 200px 1fr;
  height: 100vh;
}

/* Top Bar */
.topbar {
  grid-column: 1 / -1;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-glow);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 24px;
  z-index: 10;
}
.topbar-title {
  color: var(--neon-green);
  font-size: 16px;
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(0,255,65,0.5);
  white-space: nowrap;
}
.topbar-clock {
  color: var(--neon-cyan);
  font-size: 14px;
}
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.conn-dot.online { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 2s infinite; }
.conn-dot.offline { background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }
.uptime-label { color: var(--text-dim); font-size: 11px; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Sidebar */
.sidebar {
  background: var(--bg-panel);
  border-right: 1px solid var(--border-glow);
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  padding: 10px 16px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
  border-left: 3px solid transparent;
  font-size: 13px;
}
.nav-item:hover {
  background: rgba(0,255,65,0.05);
  color: var(--text-primary);
}
.nav-item.active {
  color: var(--neon-green);
  border-left-color: var(--neon-green);
  background: rgba(0,255,65,0.08);
  text-shadow: 0 0 8px rgba(0,255,65,0.3);
}
.nav-item .prefix { color: var(--neon-cyan); margin-right: 6px; }

/* Main content */
.main {
  overflow-y: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-glow) transparent;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 3px; }

/* Bottom status bar */
.statusbar {
  grid-column: 1 / -1;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-glow);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--text-dim);
  overflow: hidden;
}
.statusbar .cursor {
  display: inline-block;
  width: 7px; height: 14px;
  background: var(--neon-green);
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.statusbar .feed-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

/* Panel Headers */
.panel-header {
  color: var(--neon-green);
  font-size: 15px;
  letter-spacing: 2px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-glow);
  text-shadow: 0 0 8px rgba(0,255,65,0.3);
}

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid rgba(0,255,65,0.1);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
.card:hover {
  border-color: rgba(0,255,65,0.3);
}

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.badge-green { background: rgba(0,255,65,0.15); color: var(--neon-green); border: 1px solid rgba(0,255,65,0.3); }
.badge-cyan { background: rgba(0,212,255,0.15); color: var(--neon-cyan); border: 1px solid rgba(0,212,255,0.3); }
.badge-magenta { background: rgba(255,0,255,0.15); color: var(--neon-magenta); border: 1px solid rgba(255,0,255,0.3); }
.badge-amber { background: rgba(255,170,0,0.15); color: var(--neon-amber); border: 1px solid rgba(255,170,0,0.3); }
.badge-red { background: rgba(255,51,51,0.15); color: var(--neon-red); border: 1px solid rgba(255,51,51,0.3); }

/* Kanban */
.kanban {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.kanban-col {
  background: var(--bg-panel);
  border: 1px solid rgba(0,255,65,0.1);
  border-radius: 4px;
  padding: 12px;
  min-height: 200px;
}
.kanban-title {
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(0,255,65,0.1);
}

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

/* Search bar */
.search-bar {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  color: var(--neon-green);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 4px;
  outline: none;
  margin-bottom: 12px;
}
.search-bar::placeholder { color: var(--text-dim); }
.search-bar:focus { border-color: var(--neon-green); box-shadow: 0 0 8px rgba(0,255,65,0.2); }

/* Filter pills */
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.pill {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  color: var(--text-dim);
  transition: all 0.15s;
}
.pill:hover, .pill.active {
  color: var(--neon-green);
  border-color: var(--neon-green);
  background: rgba(0,255,65,0.08);
}

/* Confidence bar */
.conf-bar {
  width: 60px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.conf-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

/* Table */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.tbl th {
  text-align: left;
  padding: 8px;
  color: var(--neon-cyan);
  border-bottom: 1px solid var(--border-glow);
  font-weight: normal;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 10px;
}
.tbl td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-primary);
}
.tbl tr:hover td { background: rgba(0,255,65,0.03); }

/* Cancel button */
.btn-cancel {
  background: transparent;
  border: 1px solid var(--neon-red);
  color: var(--neon-red);
  padding: 3px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { background: rgba(255,51,51,0.15); }

/* Tool card */
.tool-card {
  background: var(--bg-card);
  border: 1px solid rgba(0,255,65,0.08);
  border-radius: 4px;
  padding: 10px;
  font-size: 12px;
}
.tool-card .tool-name {
  color: var(--neon-green);
  font-size: 12px;
  margin-bottom: 4px;
  word-break: break-all;
}
.tool-card .tool-desc {
  color: var(--text-dim);
  font-size: 10px;
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.stat-bar {
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  margin-top: 4px;
}
.stat-fill {
  height: 100%;
  background: var(--neon-cyan);
  border-radius: 2px;
}

/* Cron tile */
.cron-tile {
  background: var(--bg-card);
  border: 1px solid rgba(0,255,65,0.08);
  border-radius: 4px;
  padding: 12px;
}
.cron-tile .cron-name { font-size: 13px; margin-bottom: 4px; }
.cron-tile .cron-expr { color: var(--neon-cyan); font-size: 11px; }
.cron-tile .cron-tz { color: var(--text-dim); font-size: 10px; }
.cron-tile .cron-desc { color: var(--text-dim); font-size: 10px; margin-top: 4px; line-height: 1.3; }

/* System stats */
.stat-block {
  background: var(--bg-card);
  border: 1px solid rgba(0,255,65,0.1);
  border-radius: 4px;
  padding: 14px;
  text-align: center;
}
.stat-value {
  font-size: 24px;
  color: var(--neon-green);
  text-shadow: 0 0 10px rgba(0,255,65,0.3);
}
.stat-label {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}

/* Loading */
.loading { color: var(--text-dim); padding: 20px; text-align: center; }

/* Section divider */
.section-title {
  color: var(--neon-cyan);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 20px 0 10px;
  text-transform: uppercase;
}

@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kanban { grid-template-columns: 1fr; }
  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div id="app"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>

<script type="module">
import React from 'react';
import { createRoot } from 'react-dom/client';
import htm from 'htm';

const html = htm.bind(React.createElement);
const { useState, useEffect, useRef, useCallback } = React;

// ===== Config =====
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const API = '/control/api';
const headers = TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {};

async function apiFetch(path) {
  try {
    const res = await fetch(`${API}${path}`, { headers });
    if (!res.ok) throw new Error(`${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('API fetch failed:', path, e);
    return null;
  }
}

// ===== Format helpers =====
function fmtUptime(sec) {
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}
function fmtBytes(b) { return (b / 1048576).toFixed(1) + ' MB'; }
function fmtTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour12: false }) + ' ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtAgo(ts) {
  const sec = (Date.now() - new Date(ts).getTime()) / 1000;
  if (sec < 60) return Math.floor(sec) + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}

// ===== App Component =====
function App() {
  const [tab, setTab] = useState('tasks');
  const [clock, setClock] = useState(new Date().toLocaleTimeString('en-US', { hour12: false }));
  const [wsStatus, setWsStatus] = useState('offline');
  const [stats, setStats] = useState(null);
  const [feed, setFeed] = useState([]);
  const wsRef = useRef(null);
  const reconnectRef = useRef(null);
  const backoffRef = useRef(1000);

  // Clock
  useEffect(() => {
    const t = setInterval(() => setClock(new Date().toLocaleTimeString('en-US', { hour12: false })), 1000);
    return () => clearInterval(t);
  }, []);

  // WebSocket
  useEffect(() => {
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const url = proto + '://' + location.host + '/ws/control' + (TOKEN ? '?token=' + TOKEN : '');
      const ws = new WebSocket(url);
      wsRef.current = ws;

      ws.onopen = () => {
        setWsStatus('online');
        backoffRef.current = 1000;
      };
      ws.onclose = () => {
        setWsStatus('offline');
        wsRef.current = null;
        reconnectRef.current = setTimeout(connect, Math.min(backoffRef.current, 30000));
        backoffRef.current *= 2;
      };
      ws.onerror = () => ws.close();
      ws.onmessage = (e) => {
        try {
          const evt = JSON.parse(e.data);
          if (evt.type === 'connected') return;
          setFeed(prev => {
            const next = [{ ...evt, _id: Date.now() + Math.random() }, ...prev];
            return next.slice(0, 50);
          });
        } catch {}
      };
    }
    connect();
    return () => {
      clearTimeout(reconnectRef.current);
      if (wsRef.current) wsRef.current.close();
    };
  }, []);

  // Stats polling
  useEffect(() => {
    const load = () => apiFetch('/stats').then(d => d && setStats(d));
    load();
    const t = setInterval(load, 10000);
    return () => clearInterval(t);
  }, []);

  const tabs = [
    { id: 'tasks', label: 'Tasks' },
    { id: 'calendar', label: 'Calendar' },
    { id: 'memory', label: 'Memory' },
    { id: 'team', label: 'Team' },
  ];

  const latestEvent = feed[0];
  const feedText = latestEvent
    ? '[' + new Date(latestEvent.ts).toLocaleTimeString('en-US', { hour12: false }) + '] '
      + latestEvent.type + (latestEvent.data?.tool ? ' :: ' + latestEvent.data.tool : '')
      + (latestEvent.data?.job ? ' :: ' + latestEvent.data.job : '')
    : 'Awaiting events...';

  return html\`
    <div class="topbar">
      <span class="topbar-title">ATLAS MISSION CONTROL</span>
      <span class="topbar-clock">\${clock}</span>
      <div class="topbar-right">
        <span class="conn-dot \${wsStatus}"></span>
        <span class="uptime-label">\${wsStatus === 'online' ? 'LINKED' : 'OFFLINE'}</span>
        \${stats && html\`<span class="uptime-label">UP \${fmtUptime(stats.uptime)}</span>\`}
      </div>
    </div>

    <div class="sidebar">
      \${tabs.map(t => html\`
        <div key=\${t.id}
          class=\${'nav-item' + (tab === t.id ? ' active' : '')}
          onClick=\${() => setTab(t.id)}>
          <span class="prefix">></span>\${t.label.toUpperCase()}
        </div>
      \`)}
    </div>

    <div class="main">
      \${tab === 'tasks' && html\`<\${TasksPanel} />\`}
      \${tab === 'calendar' && html\`<\${CalendarPanel} />\`}
      \${tab === 'memory' && html\`<\${MemoryPanel} />\`}
      \${tab === 'team' && html\`<\${TeamPanel} stats=\${stats} />\`}
    </div>

    <div class="statusbar">
      <span class="cursor"></span>
      <span class="feed-text">\${feedText}</span>
      \${stats && html\`<span>WS:\${stats.wsClients || 0}</span>\`}
      \${stats && html\`<span>DAEMON:\${stats.daemonOnline ? 'ON' : 'OFF'}</span>\`}
    </div>
  \`;
}

// ===== Tasks Panel =====
function TasksPanel() {
  const [tasks, setTasks] = useState(null);
  const [pending, setPending] = useState(null);
  const [audit, setAudit] = useState(null);

  useEffect(() => {
    apiFetch('/tasks').then(d => setTasks(d || []));
    apiFetch('/tasks/pending').then(d => setPending(d || []));
    apiFetch('/audit').then(d => setAudit(d || []));
  }, []);

  async function handleCancel(id) {
    await fetch(API + '/tasks/' + id, { method: 'DELETE', headers });
    setTasks(prev => prev.filter(t => t.id !== id));
  }

  return html\`
    <div class="panel-header">// TASKS BOARD</div>
    <div class="kanban">
      <div class="kanban-col">
        <div class="kanban-title" style="color: var(--neon-green)">[ACTIVE]</div>
        \${tasks === null ? html\`<div class="loading">Loading...</div>\` :
          tasks.length === 0 ? html\`<div class="empty-state">No active tasks</div>\` :
          tasks.map(t => html\`
            <div class="card" key=\${t.id}>
              <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:4px">
                <span class="badge badge-green">\${t.taskType}</span>
                <button class="btn-cancel" onClick=\${() => handleCancel(t.id)}>CANCEL</button>
              </div>
              <div style="margin:6px 0; color:var(--text-primary)">\${t.content}</div>
              <div style="font-size:10px; color:var(--text-dim)">
                Next: \${fmtTime(t.nextRunAt)} | Runs: \${t.runCount}
              </div>
            </div>
          \`)
        }
      </div>

      <div class="kanban-col">
        <div class="kanban-title" style="color: var(--neon-amber)">[PENDING_APPROVAL]</div>
        \${pending === null ? html\`<div class="loading">Loading...</div>\` :
          pending.length === 0 ? html\`<div class="empty-state">No pending actions</div>\` :
          pending.map(p => html\`
            <div class="card" key=\${p.id}>
              <span class="badge badge-amber">\${p.tool_name}</span>
              <div style="margin:6px 0; color:var(--text-primary); font-size:12px">\${p.preview_text?.slice(0, 120)}</div>
              <div style="font-size:10px; color:var(--neon-red)">
                Expires: \${fmtTime(p.expires_at)}
              </div>
            </div>
          \`)
        }
      </div>

      <div class="kanban-col">
        <div class="kanban-title" style="color: var(--neon-cyan)">[RECENT_AUDIT]</div>
        \${audit === null ? html\`<div class="loading">Loading...</div>\` :
          audit.length === 0 ? html\`<div class="empty-state">No audit entries</div>\` :
          audit.slice(0, 15).map(a => html\`
            <div class="card" key=\${a.id} style="padding:8px">
              <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="color:var(--neon-cyan); font-size:11px">\${a.tool_name || a.action_type}</span>
                <span class=\${'badge ' + (a.success ? 'badge-green' : 'badge-red')}>\${a.success ? 'OK' : 'FAIL'}</span>
              </div>
              <div style="font-size:10px; color:var(--text-dim); margin-top:3px">
                \${a.duration_ms ? a.duration_ms + 'ms' : ''} \${fmtAgo(a.created_at)}
              </div>
            </div>
          \`)
        }
      </div>
    </div>
  \`;
}

// ===== Calendar Panel =====
function CalendarPanel() {
  const [data, setData] = useState(null);

  useEffect(() => {
    apiFetch('/calendar').then(d => setData(d));
  }, []);

  const freqColor = (cron) => {
    if (cron.startsWith('*/') || cron.startsWith('* ')) return 'var(--neon-green)';
    if (cron.includes('0 0 ') || cron.includes('0 22 ')) return 'var(--neon-magenta)';
    return 'var(--neon-cyan)';
  };

  return html\`
    <div class="panel-header">// CALENDAR</div>

    <div class="section-title">CRON JOBS</div>
    <div class="grid-4">
      \${data?.cronJobs?.map((job, i) => html\`
        <div class="cron-tile" key=\${i} style=\${'border-left: 3px solid ' + freqColor(job.cron)}>
          <div class="cron-name" style=\${'color:' + freqColor(job.cron)}>\${job.name}</div>
          <div class="cron-expr">\${job.cron}</div>
          <div class="cron-tz">\${job.timezone}</div>
          <div class="cron-desc">\${job.description}</div>
        </div>
      \`)}
    </div>

    <div class="section-title">SCHEDULED TASKS</div>
    \${data?.userTasks?.length === 0
      ? html\`<div class="empty-state">No scheduled user tasks</div>\`
      : html\`
        <table class="tbl">
          <thead><tr>
            <th>Type</th><th>Content</th><th>Schedule</th><th>Next Run</th><th>Runs</th>
          </tr></thead>
          <tbody>
            \${data?.userTasks?.map(t => html\`
              <tr key=\${t.id}>
                <td><span class="badge badge-green">\${t.taskType}</span></td>
                <td>\${t.content?.slice(0, 60)}</td>
                <td style="color:var(--neon-cyan)">\${t.scheduleValue || t.scheduleType}</td>
                <td>\${fmtTime(t.nextRunAt)}</td>
                <td>\${t.runCount}</td>
              </tr>
            \`)}
          </tbody>
        </table>
      \`
    }
  \`;
}

// ===== Memory Panel =====
function MemoryPanel() {
  const [facts, setFacts] = useState(null);
  const [learnings, setLearnings] = useState(null);
  const [search, setSearch] = useState('');
  const [categories, setCategories] = useState([]);
  const [activeCat, setActiveCat] = useState('');
  const debounceRef = useRef(null);

  useEffect(() => {
    apiFetch('/memory/facts').then(d => {
      if (d) {
        setFacts(d);
        const cats = [...new Set(d.map(f => f.category))];
        setCategories(cats);
      }
    });
    apiFetch('/memory/learnings').then(d => d && setLearnings(d));
  }, []);

  const doSearch = useCallback((q) => {
    if (q.length < 2) {
      apiFetch('/memory/facts' + (activeCat ? '?category=' + activeCat : '')).then(d => d && setFacts(d));
      return;
    }
    apiFetch('/memory/search?q=' + encodeURIComponent(q)).then(d => d && setFacts(d));
  }, [activeCat]);

  function handleSearch(e) {
    const q = e.target.value;
    setSearch(q);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => doSearch(q), 300);
  }

  function handleCat(cat) {
    const next = activeCat === cat ? '' : cat;
    setActiveCat(next);
    setSearch('');
    apiFetch('/memory/facts' + (next ? '?category=' + next : '')).then(d => d && setFacts(d));
  }

  const confColor = (c) => c > 0.7 ? 'var(--neon-green)' : c > 0.4 ? 'var(--neon-amber)' : 'var(--neon-red)';

  return html\`
    <div class="panel-header">// MEMORY</div>

    <input class="search-bar" type="text" placeholder="> search facts..."
      value=\${search} onInput=\${handleSearch} />

    <div class="pills">
      \${categories.map(cat => html\`
        <span key=\${cat} class=\${'pill' + (activeCat === cat ? ' active' : '')}
          onClick=\${() => handleCat(cat)}>\${cat}</span>
      \`)}
    </div>

    \${facts === null ? html\`<div class="loading">Loading facts...</div>\` :
      facts.length === 0 ? html\`<div class="empty-state">No facts found</div>\` :
      facts.map(f => html\`
        <div class="card" key=\${f.id}>
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px">
            <span class="badge badge-cyan">\${f.category}</span>
            <span style="color:var(--neon-green); font-size:12px">\${f.key}</span>
            <span style="margin-left:auto; font-size:10px; color:var(--text-dim)">\${f.source}</span>
          </div>
          <div style="color:var(--text-primary); font-size:12px; margin-bottom:4px">\${f.value}</div>
          <div style="display:flex; align-items:center; gap:8px; font-size:10px; color:var(--text-dim)">
            <span>Confidence:</span>
            <span class="conf-bar">
              <span class="conf-fill" style=\${'width:' + (f.confidence * 100) + '%; background:' + confColor(f.confidence)}></span>
            </span>
            <span>\${(f.confidence * 100).toFixed(0)}%</span>
            <span style="margin-left:auto">\${fmtAgo(f.updatedAt)}</span>
          </div>
        </div>
      \`)
    }

    <div class="section-title">LEARNINGS (FAILURE PATTERNS)</div>
    \${learnings === null ? html\`<div class="loading">Loading...</div>\` :
      learnings.length === 0 ? html\`<div class="empty-state">No failure patterns recorded</div>\` :
      html\`
        <table class="tbl">
          <thead><tr>
            <th>Outcome</th><th>Tool</th><th>Description</th><th>Count</th><th>When</th>
          </tr></thead>
          <tbody>
            \${learnings.map(l => html\`
              <tr key=\${l.id}>
                <td><span class=\${'badge ' + (l.outcome === 'success' ? 'badge-green' : l.outcome === 'failure' ? 'badge-red' : 'badge-amber')}>\${l.outcome}</span></td>
                <td style="color:var(--neon-cyan)">\${l.toolName || '-'}</td>
                <td>\${l.taskDescription?.slice(0, 60)}</td>
                <td>\${l.patternCount}</td>
                <td>\${fmtAgo(l.createdAt)}</td>
              </tr>
            \`)}
          </tbody>
        </table>
      \`
    }
  \`;
}

// ===== Team Panel =====
function TeamPanel({ stats }) {
  const [tools, setTools] = useState(null);
  const [toolStats, setToolStats] = useState([]);
  const [failures, setFailures] = useState([]);

  useEffect(() => {
    apiFetch('/tools').then(d => d && setTools(d));
    apiFetch('/tools/stats').then(d => d && setToolStats(d));
    apiFetch('/tools/failures').then(d => d && setFailures(d));
  }, []);

  const maxUses = Math.max(...(toolStats.map(s => s.totalUses) || [1]), 1);

  function getToolStat(name) {
    return toolStats.find(s => s.toolName === name);
  }

  const catColor = { informational: 'badge-cyan', action: 'badge-amber', sensitive: 'badge-magenta' };

  return html\`
    <div class="panel-header">// TEAM (TOOLS & AGENTS)</div>

    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-block">
        <div class="stat-value">\${stats?.tools || '-'}</div>
        <div class="stat-label">Tools</div>
      </div>
      <div class="stat-block">
        <div class="stat-value" style="color:var(--neon-cyan)">\${stats ? fmtUptime(stats.uptime) : '-'}</div>
        <div class="stat-label">Uptime</div>
      </div>
      <div class="stat-block">
        <div class="stat-value" style="color:var(--neon-amber)">\${stats ? fmtBytes(stats.memoryUsage?.heapUsed || 0) : '-'}</div>
        <div class="stat-label">Heap Used</div>
      </div>
      <div class="stat-block">
        <div class="stat-value" style=\${'color:' + (stats?.daemonOnline ? 'var(--neon-green)' : 'var(--neon-red)')}>
          \${stats?.daemonOnline ? 'ONLINE' : 'OFFLINE'}
        </div>
        <div class="stat-label">Daemon</div>
      </div>
    </div>

    <div class="section-title">TOOL REGISTRY</div>
    \${tools === null ? html\`<div class="loading">Loading tools...</div>\` :
      html\`<div class="grid-4">
        \${tools.map(t => {
          const ts = getToolStat(t.name);
          return html\`
            <div class="tool-card" key=\${t.name}>
              <div class="tool-name">\${t.name}</div>
              <div style="margin-bottom:4px">
                <span class=\${'badge ' + (catColor[t.category] || 'badge-green')}>\${t.category}</span>
                \${t.requiresApproval && html\`<span class="badge badge-red" style="margin-left:4px">APPROVAL</span>\`}
              </div>
              <div class="tool-desc">\${t.description}</div>
              \${ts ? html\`
                <div style="font-size:10px; color:var(--text-dim); display:flex; justify-content:space-between">
                  <span>\${ts.totalUses} calls</span>
                  <span style=\${'color:' + (ts.successRate > 0.9 ? 'var(--neon-green)' : ts.successRate > 0.7 ? 'var(--neon-amber)' : 'var(--neon-red)')}>\${(ts.successRate * 100).toFixed(0)}%</span>
                </div>
                <div class="stat-bar"><div class="stat-fill" style=\${'width:' + (ts.totalUses / maxUses * 100) + '%'}></div></div>
              \` : html\`
                <div style="font-size:10px; color:var(--text-dim)">No usage data</div>
              \`}
            </div>
          \`;
        })}
      </div>\`
    }

    <div class="section-title">RECENT FAILURES</div>
    \${failures.length === 0
      ? html\`<div class="empty-state">No recent failures</div>\`
      : html\`
        <table class="tbl">
          <thead><tr><th>Tool</th><th>Error</th><th>When</th></tr></thead>
          <tbody>
            \${failures.map((f, i) => html\`
              <tr key=\${i}>
                <td style="color:var(--neon-cyan)">\${f.tool_name}</td>
                <td style="color:var(--neon-red)">\${f.error_message?.slice(0, 80) || '-'}</td>
                <td>\${fmtAgo(f.created_at)}</td>
              </tr>
            \`)}
          </tbody>
        </table>
      \`
    }
  \`;
}

// ===== Mount =====
const root = createRoot(document.getElementById('app'));
root.render(html\`<\${App} />\`);
</script>
</body>
</html>
